version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: pet-platform-db
    environment:
      POSTGRES_DB: pet_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - pet-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: pet-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pet-platform
    command: redis-server --appendonly yes

  # MongoDB (日志和非结构化数据)
  mongodb:
    image: mongo:7
    container_name: pet-platform-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pet-platform

  # 后端 API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pet-platform-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pet_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_URI: mongodb://mongodb:27017/pet_platform_logs
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - pet-platform

  # 前端
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: pet-platform-frontend
    ports:
      - "3001:3000"
    environment:
      API_URL: http://localhost:3000/api
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - pet-platform

  # Nginx 反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    container_name: pet-platform-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../frontend/out:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - pet-platform
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  pet-platform:
    driver: bridge
